<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔮 互動式塔羅占卜</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-dark:#0a0a1a;--bg-card:#1a1a2e;--gold:#c9a84c;--gold-light:#f0d878;
  --text:#e8e8e8;--purple:#6b3fa0;--purple-dark:#2a1a3e;
  --red:#c0392b;--blue:#2980b9;--green:#27ae60;
}
body{font-family:'Microsoft JhengHei','PingFang TC',sans-serif;background:var(--bg-dark);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;
  background:radial-gradient(ellipse at 50% 0%,rgba(107,63,160,.3),transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(201,168,76,.1),transparent 50%);z-index:-1}

/* 星星背景 */
.stars{position:fixed;width:100%;height:100%;top:0;left:0;z-index:-1;pointer-events:none}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.2}50%{opacity:1}}

.container{max-width:1200px;margin:0 auto;padding:20px}

/* 標題 */
header{text-align:center;padding:30px 0}
header h1{font-size:2.5em;color:var(--gold);text-shadow:0 0 20px rgba(201,168,76,.5);margin-bottom:10px}
header p{font-size:1.1em;color:#999}

/* 步驟指引 */
.steps{display:flex;justify-content:center;gap:10px;margin:20px 0;flex-wrap:wrap}
.step{padding:8px 20px;border:1px solid var(--gold);border-radius:20px;color:var(--gold);font-size:.9em;transition:all .3s}
.step.active{background:var(--gold);color:#000;box-shadow:0 0 15px rgba(201,168,76,.4)}
.step.done{background:rgba(201,168,76,.2);color:var(--gold)}

/* 卡片場景 */
.scene{display:none;animation:fadeIn .5s}
.scene.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* 問題輸入 */
.question-box{text-align:center;max-width:600px;margin:0 auto;padding:30px}
.question-box textarea{width:100%;padding:15px;border:1px solid var(--gold);border-radius:10px;background:var(--bg-card);color:var(--text);font-size:1.1em;resize:none;min-height:80px}
.question-box textarea:focus{outline:none;border-color:var(--gold-light);box-shadow:0 0 10px rgba(201,168,76,.3)}

/* 牌陣選擇 */
.spread-options{display:flex;justify-content:center;gap:15px;flex-wrap:wrap;margin:20px 0}
.spread-card{width:200px;padding:20px;border:1px solid #444;border-radius:12px;background:var(--bg-card);cursor:pointer;transition:all .3s;text-align:center}
.spread-card:hover{border-color:var(--gold);transform:translateY(-5px);box-shadow:0 5px 20px rgba(201,168,76,.2)}
.spread-card.selected{border-color:var(--gold);background:var(--purple-dark)}
.spread-card h3{color:var(--gold);margin-bottom:8px;font-size:1.1em}
.spread-card p{font-size:.85em;color:#999;line-height:1.5}
.spread-card .positions{margin-top:8px;font-size:.8em;color:var(--gold-light)}

/* 洗牌區 */
.shuffle-area{text-align:center;padding:30px}
.deck-display{display:inline-block;position:relative;width:120px;height:180px;margin:20px;cursor:pointer}
.card-back{width:120px;height:180px;border-radius:10px;
  background:linear-gradient(135deg,#2a1a3e,#4a2a6e);
  border:2px solid var(--gold);position:absolute;box-shadow:0 4px 15px rgba(0,0,0,.5);
  display:flex;align-items:center;justify-content:center;
  background-image:repeating-linear-gradient(45deg,transparent,transparent 10px,rgba(201,168,76,.05) 10px,rgba(201,168,76,.05) 20px)}
.card-back::after{content:'✦';font-size:40px;color:var(--gold);opacity:.5}
.deck-display.shuffling .card-back{animation:shuffle 1s ease-in-out}
@keyframes shuffle{0%{transform:translate(0,0) rotate(0)}25%{transform:translate(-30px,-15px) rotate(-10deg)}50%{transform:translate(20px,-30px) rotate(10deg)}75%{transform:translate(-15px,-10px) rotate(-5deg)}100%{transform:translate(0,0) rotate(0)}}

/* 扇形展牌 */
.fan-cards{display:flex;justify-content:center;align-items:center;gap:0;margin:30px 0;perspective:1000px;flex-wrap:wrap}
.fan-card{width:80px;height:130px;margin:2px;cursor:pointer;transition:all .3s;position:relative;transform-style:preserve-3d}
.fan-card:hover{transform:translateY(-15px) scale(1.1);z-index:10}
.fan-card .card-back{width:80px;height:130px}
.fan-card.selected{transform:translateY(-25px) scale(1.15);z-index:20}
.fan-card.selected .card-back{border-color:var(--gold-light);box-shadow:0 0 20px rgba(201,168,76,.6)}

/* 翻牌動畫 */
.card-flip{width:140px;height:210px;perspective:1000px;cursor:pointer;display:inline-block;margin:8px}
.card-flip-inner{position:relative;width:100%;height:100%;text-align:center;transition:transform .6s;transform-style:preserve-3d}
.card-flip.flipped .card-flip-inner{transform:rotateY(180deg)}
.card-flip .front,.card-flip .back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:10px;overflow:hidden}
.card-flip .back{background:linear-gradient(135deg,#2a1a3e,#4a2a6e);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center}
.card-flip .back::after{content:'✦';font-size:40px;color:var(--gold);opacity:.5}
.card-flip .front{background:var(--bg-card);border:2px solid var(--gold);transform:rotateY(180deg)}
.card-flip .front img{width:100%;height:100%;object-fit:cover}
.card-flip .front .fallback{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px;text-align:center}
.card-flip .front .fallback .num{font-size:2em;color:var(--gold);margin-bottom:4px}
.card-flip .front .fallback .name{font-size:.75em;color:var(--text);line-height:1.2}
.card-flip .front .fallback .sd{font-size:.6em;color:var(--gold-light);margin-top:2px}
.card-flip.reversed .card-flip-inner{transform:rotateY(180deg) rotateZ(180deg)}
.card-flip.reversed:not(.flipped) .card-flip-inner{transform:rotateZ(180deg)}

/* 牌陣排列 */
.spread-display{display:flex;justify-content:center;align-items:center;flex-wrap:wrap;gap:10px;margin:20px 0}
.spread-display.vertical{flex-direction:column}
.spread-row{display:flex;gap:10px;align-items:center;justify-content:center}
.card-position{display:flex;flex-direction:column;align-items:center;gap:5px}
.position-label{font-size:.8em;color:var(--gold);text-align:center;font-weight:bold}

/* 解牌結果 */
.result-area{max-width:800px;margin:30px auto;padding:25px;background:var(--bg-card);border:1px solid var(--gold);border-radius:15px}
.result-area h2{color:var(--gold);text-align:center;margin-bottom:15px}
.result-card{margin:15px 0;padding:15px;border-left:3px solid var(--gold);background:rgba(0,0,0,.3);border-radius:0 8px 8px 0}
.result-card h3{color:var(--gold-light);margin-bottom:5px}
.result-card .upright{color:var(--green);font-weight:bold}
.result-card .reversed{color:var(--red);font-weight:bold}
.result-card .meaning{margin-top:8px;color:#ccc;line-height:1.6}
.summary{margin-top:20px;padding:20px;background:rgba(107,63,160,.15);border-radius:10px;border:1px solid rgba(201,168,76,.3)}
.summary h3{color:var(--gold);margin-bottom:10px;text-align:center}
.summary p{color:#ddd;line-height:1.8;text-align:justify}

/* 詳細解牌 */
.detail-area{max-width:800px;margin:20px auto;padding:25px;background:linear-gradient(135deg,rgba(42,26,62,.6),rgba(26,26,46,.8));border:2px solid var(--gold);border-radius:15px;box-shadow:0 0 30px rgba(201,168,76,.15)}
.detail-area h2{color:var(--gold);text-align:center;margin-bottom:20px;text-shadow:0 0 10px rgba(201,168,76,.3)}
.detail-section{margin:18px 0;padding:18px 20px;background:rgba(0,0,0,.3);border-radius:12px;border-left:4px solid var(--gold)}
.detail-section h3{color:var(--gold-light);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.detail-section p{color:#ddd;line-height:2;text-align:justify;margin-bottom:12px}
.detail-section p:last-child{margin-bottom:0}
.detail-section .pos-tag{display:inline-block;padding:2px 10px;border-radius:12px;font-size:.85em;margin-right:8px}
.detail-section .pos-tag.up{background:rgba(39,174,96,.25);color:#2ecc71;border:1px solid #27ae60}
.detail-section .pos-tag.rev{background:rgba(192,57,43,.25);color:#e74c3c;border:1px solid #c0392b}
.detail-answer{margin-top:20px;padding:25px;background:linear-gradient(135deg,rgba(201,168,76,.1),rgba(107,63,160,.15));border-radius:15px;border:2px solid var(--gold-light);text-align:center}
.detail-answer h3{color:var(--gold-light);margin-bottom:15px;font-size:1.3em}
.detail-answer .verdict{display:inline-block;padding:15px 35px;font-size:1.15em;font-weight:bold;border-radius:30px;margin:10px 0}
.detail-answer .verdict.yes{background:rgba(39,174,96,.2);color:#2ecc71;border:2px solid #27ae60}
.detail-answer .verdict.maybe{background:rgba(241,196,15,.2);color:#f1c40f;border:2px solid #f39c12}
.detail-answer .verdict.no{background:rgba(192,57,43,.2);color:#e74c3c;border:2px solid #c0392b}
.detail-answer .verdict.maybe{background:rgba(155,89,182,.2);color:#bb8fce;border:2px solid #8e44ad}
.detail-advice{margin-top:15px;padding:15px;background:rgba(0,0,0,.25);border-radius:10px;color:#eee;line-height:1.8}
.scoring-chart{margin-top:15px;padding:15px;background:rgba(0,0,0,.25);border-radius:10px}
.scoring-chart .bar-label{display:flex;justify-content:space-between;margin-bottom:4px;font-size:.9em}
.scoring-chart .bar-container{height:18px;background:rgba(0,0,0,.4);border-radius:9px;overflow:hidden;position:relative}
.scoring-chart .bar-fill{height:100%;border-radius:9px;transition:width 1s ease-out}
.scoring-chart .bar-fill.positive{background:linear-gradient(90deg,#27ae60,#2ecc71)}
.scoring-chart .bar-fill.neutral{background:linear-gradient(90deg,#f39c12,#f1c40f)}
.scoring-chart .bar-fill.negative{background:linear-gradient(90deg,#c0392b,#e74c3c)}

/* 設定按鈕 */
.settings-btn{position:fixed;top:15px;right:15px;width:40px;height:40px;border-radius:50%;border:2px solid var(--gold);background:var(--bg-card);color:var(--gold);font-size:18px;cursor:pointer;z-index:100;transition:all .3s}
.settings-btn:hover{background:var(--gold);color:#000}
.settings-btn.has-key{border-color:#2ecc71;color:#2ecc71}

/* 設定彈窗 */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:200;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--bg-card);border:2px solid var(--gold);border-radius:15px;padding:30px;max-width:500px;width:90%;box-shadow:0 0 40px rgba(201,168,76,.3)}
.modal h2{color:var(--gold);text-align:center;margin-bottom:15px}
.modal p{color:#999;font-size:.9em;line-height:1.6;margin-bottom:15px}
.modal input{width:100%;padding:12px;border:1px solid var(--gold);border-radius:8px;background:var(--bg-dark);color:var(--text);font-size:1em;box-sizing:border-box}
.modal input:focus{outline:none;border-color:var(--gold-light);box-shadow:0 0 10px rgba(201,168,76,.3)}
.modal .modal-btns{display:flex;gap:10px;justify-content:center;margin-top:20px}
.modal .key-status{text-align:center;margin:10px 0;font-size:.85em}
.modal .key-status.set{color:#2ecc71}
.modal .key-status.unset{color:#e74c3c}
.modal select{width:100%;padding:10px;border:1px solid var(--gold);border-radius:8px;background:var(--bg-dark);color:var(--text);font-size:1em;margin:10px 0;box-sizing:border-box}

/* AI 解牌區 */
.ai-area{max-width:800px;margin:20px auto;padding:25px;background:linear-gradient(135deg,rgba(42,26,62,.6),rgba(20,20,50,.8));border:2px solid #b07c4c;border-radius:15px;box-shadow:0 0 30px rgba(176,124,76,.15)}
.ai-area h2{color:#d4a76a;text-align:center;margin-bottom:15px}
.ai-area .ai-content{color:#e0d8c8;line-height:1.9;white-space:pre-wrap}
.ai-area .ai-content h3{color:#d4a76a;margin:15px 0 8px}
.ai-area .ai-content p{margin-bottom:12px}
.ai-area .ai-content strong{color:#e8c878}
.ai-area .ai-content em{color:#a8d4a8}
.ai-loading{display:flex;flex-direction:column;align-items:center;padding:40px;gap:15px}
.ai-loading .spinner{width:50px;height:50px;border:3px solid rgba(176,124,76,.3);border-top:3px solid #d4a76a;border-radius:50%;animation:spin 1s linear infinite}
.ai-loading p{color:#d4a76a;text-align:center}
.ai-error{padding:20px;background:rgba(192,57,43,.15);border:1px solid #e74c3c;border-radius:10px;color:#e0c8c8;text-align:center;margin:15px 0}
.btn-ai{border-color:#b07c4c;color:#d4a76a}
.btn-ai:hover{background:#b07c4c;color:#000;box-shadow:0 0 20px rgba(176,124,76,.4)}

/* 按鈕 */
.btn{padding:12px 30px;border:2px solid var(--gold);border-radius:25px;background:transparent;color:var(--gold);font-size:1em;cursor:pointer;transition:all .3s}
.btn:hover{background:var(--gold);color:#000;box-shadow:0 0 20px rgba(201,168,76,.4)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--gold);color:#000}
.btn-primary:hover{background:var(--gold-light)}

.btn-group{display:flex;justify-content:center;gap:15px;margin:20px 0;flex-wrap:wrap}

/* 提示 */
.hint{text-align:center;color:#888;font-size:.9em;margin:10px 0}

/* 抽牌計數 */
.draw-counter{text-align:center;margin:10px 0;color:var(--gold)}
.draw-counter .current{font-size:1.5em;font-weight:bold}

/* 問題顯示 */
.question-display{text-align:center;margin:15px 0;padding:10px 20px;background:rgba(107,63,160,.1);border-radius:20px;color:var(--gold-light);font-style:italic}

/* Loading */
.loading{display:inline-block;width:40px;height:40px;border:3px solid var(--gold);border-top:transparent;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.transition { text-align:center;padding:30px }

@media(max-width:600px){
  header h1{font-size:1.8em}
  .fan-card{width:60px;height:100px}
  .fan-card .card-back{width:60px;height:100px}
  .card-flip{width:100px;height:150px}
  .spread-card{width:150px}
}
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<button class="settings-btn" id="settingsBtn" onclick="openSettings()" title="AI 解牌設定">⚙</button>

<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <h2>⚙ AI 解牌設定</h2>
    <p>輸入你的 Claude API Key 來啟用 AI 專業解牌功能。<br>
    Key 只會存在你的瀏覽器中（localStorage），不會上傳到任何伺服器。<br>
    取得 Key 請至 <a href="https://console.anthropic.com/" target="_blank" style="color:var(--gold-light)">Anthropic Console</a></p>
    <input type="password" id="apiKeyInput" placeholder="sk-ant-...">
    <div class="key-status" id="keyStatus"></div>
    <select id="modelSelect">
      <option value="claude-sonnet-4-20250514">Claude Sonnet 4（推薦，品質高）</option>
      <option value="claude-3-5-sonnet-20241022">Claude 3.5 Sonnet</option>
      <option value="claude-3-5-haiku-20241022">Claude 3.5 Haiku（較快較便宜）</option>
    </select>
    <div class="modal-btns">
      <button class="btn" onclick="closeSettings()">取消</button>
      <button class="btn btn-primary" onclick="saveApiKey()">儲存</button>
    </div>
  </div>
</div>

<div class="container">
  <header>
    <h1>🔮 互動式塔羅占卜</h1>
    <p>靜下心來，想著你的問題，讓塔羅指引你</p>
  </header>

  <div class="steps">
    <div class="step active" id="step1">① 輸入問題</div>
    <div class="step" id="step2">② 選擇牌陣</div>
    <div class="step" id="step3">③ 洗牌</div>
    <div class="step" id="step4">④ 抽牌</div>
    <div class="step" id="step5">⑤ 翻牌解牌</div>
  </div>

  <!-- Scene 1: 問題輸入 -->
  <div class="scene active" id="scene1">
    <div class="question-box">
      <h2 style="color:var(--gold);margin-bottom:15px">🙏 請在心中默念你的問題</h2>
      <textarea id="questionInput" placeholder="例如：我的房子能在三個月內賣出嗎？&#10;或者：我未來三個月的事業運勢如何？"></textarea>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="goToSpreadSelect()">下一步 →</button>
      </div>
    </div>
  </div>

  <!-- Scene 2: 牌陣選擇 -->
  <div class="scene" id="scene2">
    <h2 style="text-align:center;color:var(--gold);margin-bottom:20px">📊 選擇占卜牌陣</h2>
    <div class="spread-options" id="spreadOptions"></div>
    <div class="btn-group">
      <button class="btn" onclick="prevScene()">← 上一步</button>
      <button class="btn btn-primary" id="selectSpreadBtn" disabled onclick="goToShuffle()">下一步 →</button>
    </div>
  </div>

  <!-- Scene 3: 洗牌 -->
  <div class="scene" id="scene3">
    <div id="questionDisplay"></div>
    <div class="shuffle-area">
      <h2 style="color:var(--gold);margin-bottom:10px">🔀 洗牌中...</h2>
      <p class="hint">點擊牌堆洗牌，也可以翻轉方向。準備好後點「開始抽牌」</p>
      <div class="deck-display" id="deckDisplay" onclick="shuffleDeck()">
        <div class="card-back"></div>
        <div class="card-back" style="transform:translate(2px,-2px)"></div>
        <div class="card-back" style="transform:translate(4px,-4px)"></div>
      </div>
      <div class="btn-group">
        <button class="btn" onclick="prevScene()">← 上一步</button>
        <button class="btn" onclick="shuffleDeck()">再洗一次</button>
        <button class="btn btn-primary" onclick="goToDraw()">開始抽牌 →</button>
      </div>
    </div>
  </div>

  <!-- Scene 4: 抽牌 -->
 <div class="scene" id="scene4">
    <div id="questionDisplay2"></div>
    <h2 style="text-align:center;color:var(--gold);margin-bottom:5px">🃏 請選擇你的牌</h2>
    <div class="draw-counter" id="drawCounter"></div>
    <p class="hint" id="drawHint">從下方扇形排列中，憑直覺點選牌</p>
    <div class="fan-cards" id="fanCards"></div>
    <div class="btn-group">
      <button class="btn" onclick="prevScene()">← 重新洗牌</button>
    </div>
  </div>

  <!-- Scene 5: 翻牌 + 解牌 -->
  <div class="scene" id="scene5">
    <div id="questionDisplay3"></div>
    <h2 style="text-align:center;color:var(--gold);margin-bottom:5px">🃏 翻開你的牌</h2>
    <p class="hint">點擊每張牌翻開，全部翻開後看完整解牌</p>
    <div class="spread-display" id="spreadDisplay"></div>
    <div class="btn-group">
      <button class="btn" onclick="revealAll()">全部翻開</button>
      <button class="btn btn-primary" id="interpretBtn" style="display:none" onclick="interpret()">完整解牌</button>
    </div>
    <div class="result-area" id="resultArea" style="display:none"></div>
    <div class="btn-group" id="detailBtnGroup" style="display:none">
      <button class="btn btn-primary" onclick="interpretDetailed()">🔮 針對問題詳細解牌</button>
      <button class="btn btn-ai" id="aiBtn" onclick="interpretWithAI()">🤖 AI 專業解牌</button>
      <button class="btn btn-ai" id="opencodeBtn" onclick="interpretWithOpencode()" style="display:none">🤖 opencode 解牌</button>
      <button class="btn" id="copyBtn" onclick="copyForAI()">📋 複製牌面給 AI</button>
    </div>
    <div class="detail-area" id="detailArea" style="display:none"></div>
    <div class="ai-area" id="aiArea" style="display:none"></div>
    <div class="btn-group" id="finalButtons" style="display:none">
      <button class="btn btn-primary" onclick="reset()">再占一次</button>
    </div>
  </div>
</div>

<script>
// ==================== 塔羅牌資料庫 ====================
const tarotCards = [
  // 大阿爾克那 0-21
  {num:"0",name:"愚者",en:"The Fool",type:"major",upright:"新的開始、冒險、自由、純真、無限可能",reversed:"魯莽、冒險過頭、愚蠢、缺乏計畫",meaning:"愚者代表一段新旅程的開始，帶著孩童般的好奇與信任，踏上未知的道路。他不怕跌倒，因為相信過程本身就是收穫。",rev_meaning:"逆位的愚者提醒你：衝動不等於勇氣，盲目的跳躍可能帶來不必要的風險。在行動前花點時間深思。"},
  {num:"I",name:"魔術師",en:"The Magician",type:"major",upright:"創造力、意志力、掌控力、技能、顯化",reversed:"欺騙、操縱、未發揮才能、缺乏自信",meaning:"魔術師擁有四元素的工具，代表你有能力將想法化為現實。只要你設定明確目標並善用資源，就能創造奇蹟。",rev_meaning:"逆位魔術師暗示才能被浪費或用於不當目的。捫心自問：你是否在欺騙自己或他人？"},
  {num:"II",name:"女祭司",en:"The High Priestess",type:"major",upright:"直覺、潛意識、神秘、內在智慧、靜默",reversed:"忽略直覺、隱藏的秘密、資訊不透明、內在不平衡",meaning:"女祭司坐在兩根柱子之間，代表在對立中找到平衡。她提醒你傾聽內在聲音，答案不在外面，而在你的潛意識裡。",rev_meaning:"逆位元女祭司表示你過度依賴外在資訊，忽略了自己的直覺。也可能暗示有秘密被隱藏。"},
  {num:"III",name:"皇后",en:"The Empress",type:"major",upright:"豐饒、創造、母性、自然、成長、舒適",reversed:"過度依賴、束縛、創造力受阻、忽視自我",meaning:"皇后是大地之母，代表豐盛、創造與成長。她告訴你：現在是滋養與收穫的時刻，讓事物自然發展，不強求。",rev_meaning:"逆位元皇后暗示過度保護或依賴導致停滯，也可能是創造力被家庭或情感問題所阻礙。"},
  {num:"IV",name:"皇帝",en:"The Emperor",type:"major",upright:"權威、結構、控制、領導力、穩定、父親",reversed:"專制、僵化、濫用權力、缺乏自律、控制欲過強",meaning:"皇帝代表秩序與結構。他提醒你建立清晰的規則和目標，用紀律和穩定來支撐你的野心。",rev_meaning:"逆位元皇帝暗示過度控制或缺乏自律。你可能在某些方面太過僵硬，不願妥協。"},
  {num:"V",name:"教皇",en:"The Hierophant",type:"major",upright:"傳統、信仰、教育、指導、婚嫁、體制",reversed:"反叛、打破常規、非傳統、自由思考",meaning:"教皇代表尋求指引和遵循傳統。他提醒你：有時候遵循已驗證的方法和智慧，比自行摸索更有效率。",rev_meaning:"逆位教皇暗示你正在挑戰傳統或感到受限於規則。也可能是尋求非常規的解決方案。"},
  {num:"VI",name:"戀人",en:"The Lovers",type:"major",upright:"愛情、選擇、和諧、價值觀、夥伴關係",reversed:"關係失衡、錯誤選擇、價值觀衝突、不忠",meaning:"戀人牌不僅代表愛情，更代表重要的選擇。天使在上方祝福，暗示跟隨你的心和價值觀來做決定。",rev_meaning:"逆位戀人暗示關係中的不和諧或面臨艱難的選擇。你可能在內心深處知道該怎麼做卻不願面對。"},
  {num:"VII",name:"戰車",en:"The Chariot",type:"major",upright:"意志力、決心、勝利、控制、前進、旅程",reversed:"缺乏方向、失控、衝突、侵略性、受阻",meaning:"戰車代表透過意志力和決心取得勝利。駕馭對立的力量，堅定地朝目標前進，你將會成功。",rev_meaning:"逆位元戰車暗示失去方向或控制。你可能同時想做太多事，導致什麼都做不好。"},
  {num:"VIII",name:"力量",en:"Strength",type:"major",upright:"內在力量、勇氣、耐心、柔克剛、自制",reversed:"自我懷疑、脆弱、缺乏信心、失控、焦慮",meaning:"力量牌展現的是內在的勇氣，而非蠻力。溫柔地馴服你的恐懼，用愛和耐心來克服困難。",rev_meaning:"逆位元力量暗示你正被恐懼或自我懷疑所困。你需要重新找回對自己的信心。"},
  {num:"IX",name:"隱者",en:"The Hermit",type:"major",upright:"獨處、內省、智慧、指引、靈性、謹慎",reversed:"孤立、退縮、拒絕指引、偏執、迷失",meaning:"隱者提著燈籠獨自行走，代表向內探索的時刻。在靜默中你會找到答案，暫時退出紛擾是必要的。",rev_meaning:"逆位隱者暗示過度孤立或拒絕他人的幫助。獨處是有益的但不要變成逃避。"},
  {num:"X",name:"命運之輪",en:"Wheel of Fortune",type:"major",upright:"轉變、循環、好運、命運、機會、變化",reversed:"壞運、抗拒變化、失控、挫折、延遲",meaning:"命運之輪象徵生命的循環。當輪子轉動時新的機會就來了。順應變化不要抗拒。",rev_meaning:"逆位命運之輪暗示你正處於低潮或抗拒必然的變化。記住：輪子終會再轉上來。"},
  {num:"XI",name:"正義",en:"Justice",type:"major",upright:"公平、真相、因果、法律、平衡、正直",reversed:"不公、偏見、不誠實、逃避責任、延遲",meaning:"正義牌代表因果法則。你過去的行為將帶來相應的結果。做正確的事結果自然會好。",rev_meaning:"逆位正義暗示不公平或延遲。也可能表示你需要為自己的行為負責。"},
  {num:"XII",name:"倒吊人",en:"The Hanged Man",type:"major",upright:"暫停、犧牲、新視角、等待、放下",reversed:"無謂犧牲、停滯、拖延、無法放下、抗拒改變",meaning:"倒吊人代表有意識的等待和犧牲。換個角度看事情你會得到新的理解。順其自然暫時不求進展。",rev_meaning:"逆位倒吊人暗示無意義的等待或抗拒。你可能在為不值得的事犧牲。"},
  {num:"XIII",name:"死神",en:"Death",type:"major",upright:"結束、轉變、蛻變、釋放、結束舊的階段",reversed:"抗拒變化、停滯、害怕結束、無法放下",meaning:"死神牌不代表死亡而是蛻變。結束是為了新生你可能需要結束一段關係或狀態才能迎接新開始。",rev_meaning:"逆位死神暗示你正在抗拒必要的結束。緊抓過去不放只會延長痛苦。"},
  {num:"XIV",name:"節制",en:"Temperance",type:"major",upright:"平衡、調和、耐心、融合、中庸、療癒",reversed:"失衡、過度、缺乏耐心、衝突、不協調",meaning:"節制牌代表找到平衡。天使兩手持杯水流不息象徵調和對立的力量。中庸之道是最佳策略。",rev_meaning:"逆位節制暗示生活失衡某一方面過度。你需要重新調整步調找到中間點。"},
  {num:"XV",name:"惡魔",en:"The Devil",type:"major",upright:"束縛、執著、誘惑、物質主義、成癮、合約",reversed:"解放、脫離束縛、覺醒、戒除、重獲自由",meaning:"惡魔牌代表你被某種東西束縛——金錢、慾望、恐懼或一段關係。你以為自己被困但其實鎖鏈是鬆的你可以選擇離開。",rev_meaning:"逆位元惡魔是一張好牌！代表你正在掙脫束縛重獲自由意識正在覺醒。"},
  {num:"XVI",name:"高塔",en:"The Tower",type:"major",upright:"突變、破壞、啟示、劇變、崩塌、覺醒",reversed:"避免災難、延緩變化、抗拒真相、內在動搖",meaning:"高塔被閃電擊中代表突如其來的變化。雖然看起來像災難但它摧毀的是不穩固的根基為重建鋪路。",rev_meaning:"逆位高塔暗示你正在避免必然的變化或危機被延緩。但遲早要面對。"},
  {num:"XVII",name:"星星",en:"The Star",type:"major",upright:"希望、信念、靈感、甦醒、指引、寧靜",reversed:"失望、悲觀、失去信念、絕望、缺乏信心",meaning:"星星牌是塔羅中最溫柔的希望。暴風雨過後星光指引方向。保持信念你會走出低谷。",rev_meaning:"逆位星星暗示暫時失去信念或感到失望。但星光仍在只是被雲遮住了。"},
  {num:"XVIII",name:"月亮",en:"The Moon",type:"major",upright:"幻覺、潛意識、不安、直覺、未知、恐懼",reversed:"真相浮現、撥開迷霧、釋放恐懼、清醒",meaning:"月亮牌代表不確定和潛意識的恐懼。你所看到的不一定是真相。在黑暗中保持警覺但不要被恐懼吞噬。",rev_meaning:"逆位元月亮代表迷霧散去真相浮現。你開始看清事實不再被困惑所困擾。"},
  {num:"XIX",name:"太陽",en:"The Sun",type:"major",upright:"喜悅、成功、活力、清晰、樂觀、溫暖",reversed:"暫時的陰影、延遲、失去熱情、過度樂觀、短暫低落",meaning:"太陽牌是最正向的牌之一。代表快樂、成功和活力。一切都將明朗化好消息即將到來。",rev_meaning:"逆位太陽只是暫時的陰影。光芒依然存在只是短暫被遮擋。"},
  {num:"XX",name:"審判",en:"Judgement",type:"major",upright:"重生、覺醒、召喚、赦免、反省、決定",reversed:"自我懷疑、延期、避免反省、拒絕召喚、猶豫",meaning:"審判牌代表一個重要的覺醒時刻。天使吹響號角召喚你做出決定。你聽到了嗎？",rev_meaning:"逆位審判暗示你在猶豫或拒絕內心的召喚。可能是時候對自己做一個誠實的評估了。"},
  {num:"XXI",name:"世界",en:"The World",type:"major",upright:"完成、圓滿、成就、成功、旅行、整合",reversed:"未完成、延遲、停滯、缺乏結論、殘局",meaning:"世界牌代表一個循環的圓滿完成。你已經走完整段旅程享受成果並準備迎接新篇章。",rev_meaning:"逆位世界暗示你離完成只差一步但停滯不前。堅持下去你終將到達。"},

  // 權杖 1-14
  {num:"1",name:"權杖王牌",en:"Ace of Wands",type:"minor-suit-wands",upright:"新靈感、熱情、成長、活力、機會、創造",reversed:"延遲、缺乏熱情、低能量、錯失機會、停滯",meaning:"一隻手從雲中伸出握住權杖代表新的靈感和熱情湧現。現在是發起新計畫的好時機。",rev_meaning:"逆位暗示熱情消退或靈感被阻塞。需要重新點燃內心的火焰。"},
  {num:"2",name:"權杖二",en:"Two of Wands",type:"minor-suit-wands",upright:"計畫、決定、未來、選擇、探索、願景",reversed:"害怕選擇、計畫受阻、猶豫、放棄、視野受限",meaning:"權杖二代表站在高處眺望遠方。你正在規劃未來手握世界思考下一步該往哪裡去。",rev_meaning:"逆位暗示你害怕踏出舒適圈或計畫被擱置。不要讓恐懼阻止你行動。"},
  {num:"3",name:"權杖三",en:"Three of Wands",type:"minor-suit-wands",upright:"進展、擴展、前景、等待、合作、貿易",reversed:"延遲、挫折、擴張困難、孤立、缺乏進展",meaning:"權杖三代表你的計畫已經啟動船隻正在駛向遠方。你做好準備等待成果到來。",rev_meaning:"逆位暗示延遲或合作出現問題。可能需要重新評估時程。"},
  {num:"4",name:"權杖四",en:"Four of Wands",type:"minor-suit-wands",upright:"慶祝、團聚、穩定、家、歡迎、里程碑",reversed:"過渡期、不穩定、缺乏支持、衝突、延遲慶祝",meaning:"權杖四代表慶祝和穩定。城堡上掛著花環象徵達成里程碑。好消息和團聚的喜悅即將到來。",rev_meaning:"逆位暗示家庭或社區中的不穩定。也代表處於過渡期尚未完全安定。"},
  {num:"5",name:"權杖五",en:"Five of Wands",type:"minor-suit-wands",upright:"競爭、衝突、障礙、多元意見、辯論",reversed:"和解、避免衝突、內在鬥爭、休戰、壓力減輕",meaning:"權杖五代表五人各持己見互相競爭。你正面臨挑戰但這也是成長的機會。",rev_meaning:"逆位代表衝突緩和或你學會了如何在競爭中保持和平。"},
  {num:"6",name:"權杖六",en:"Six of Wands",type:"minor-suit-wands",upright:"勝利、認可、成就、榮耀、公眾讚譽",reversed:"失敗、延遲、缺乏認可、自我懷疑、名譽受損",meaning:"權杖六代表騎馬凱旋接受群眾歡呼。你的努力被看見了成功和榮耀屬於你。",rev_meaning:"逆位暗示勝利延遲或得不到應有的認可。不要因此氣餒繼續努力。"},
  {num:"7",name:"權杖七",en:"Seven of Wands",type:"minor-suit-wands",upright:"防禦、堅守立場、挑戰、抵抗、毅力",reversed:"退讓、放棄、無法堅持、被壓倒、不堪負荷",meaning:"權杖七代表站在高處抵禦下方攻擊。你需要堅定立場保護你已建立的成果。",rev_meaning:"逆位暗示你感到不堪負荷或準備放棄。重新評估局勢也許還有轉機。"},
  {num:"8",name:"權杖八",en:"Eight of Wands",type:"minor-suit-wands",upright:"速度、訊息、進展、旅行、迅速變化、溝通",reversed:"延遲、受阻、誤解、計畫暫停、取消",meaning:"權杖八在空中疾飛代表事情快速發展。訊息即將到來事情會比預期更快推進。",rev_meaning:"逆位暗示延遲或溝通不順。計畫可能被迫暫停耐心等待。"},
  {num:"9",name:"權杖九",en:"Nine of Wands",type:"minor-suit-wands",upright:"毅力、堅持、防備、疲憊、接近成功",reversed:"放棄、疲憊不堪、防備過度、精疲力竭、最後關頭退縮",meaning:"權杖九代表你已經戰鬥很久受了傷但仍站立。你離成功很近了不要在這一刻放棄。",rev_meaning:"逆位暗示你精疲力竭快要放棄。即使只剩一步也要堅持下去。"},
  {num:"10",name:"權杖十",en:"Ten of Wands",type:"minor-suit-wands",upright:"重擔、責任、努力、壓力、接近終點",reversed:"卸下重擔、釋放、委派、結束艱辛、解脫",meaning:"權杖十代表背負沉重的負擔你努力前行。雖然壓力很大但你幾乎到達終點了。",rev_meaning:"逆位是一張好牌代表你開始卸下重擔學會委派或任務即將完成。"},
  {num:"11",name:"權杖侍者",en:"Page of Wands",type:"minor-suit-wands",upright:"探索、熱情、新消息、冒險、創意、學習",reversed:"三分鐘熱度、拖延、壞消息、缺乏方向、不成熟",meaning:"權杖侍者代表年輕的探索者充滿好奇心和熱情。新的消息或機會就在眼前。",rev_meaning:"逆位暗示熱情來得快去得也快或收到令人失望的消息。"},
  {num:"12",name:"權杖騎士",en:"Knight of Wands",type:"minor-suit-wands",upright:"冒險、行動力、衝勁、熱情、旅行、勇敢",reversed:"衝動、魯莽、延遲、憤怒、方向感缺失、半途而廢",meaning:"權杖騎士策馬向前代表充滿能量的行動力。跟著你的熱情勇敢推進計畫。",rev_meaning:"逆位暗示衝動行事或計畫延遲。在行動前要先想清楚方向。"},
  {num:"13",name:"權杖皇后",en:"Queen of Wands",type:"minor-suit-wands",upright:"自信、魅力、熱情、獨立、溫暖、領導力",reversed:"不安全感、嫉妒、支配欲、自我懷疑、情緒化",meaning:"權杖皇后充滿自信和魅力她不害怕展現自己。找到你內在的光芒大方地照亮周遭的人。",rev_meaning:"逆位暗示你因不安全感而表現出嫉妒或支配欲。需要重新找回自信。"},
  {num:"14",name:"權杖國王",en:"King of Wands",type:"minor-suit-wands",upright:"領導力、遠見、魄力、果斷、企業家、鼓舞",reversed:"專制、衝動、過度控制、暴躁、不擇手段、缺乏遠見",meaning:"權杖國王是天生領袖充滿遠見和魄力。用你的熱情和決斷力帶領團隊前進。",rev_meaning:"逆位暗示領導變成控制或脾氣暴躁。需要學習授權和人溝通。"},

  // 聖杯 1-14
  {num:"1",name:"聖杯王牌",en:"Ace of Cups",type:"minor-suit-cups",upright:"新感情、愛情、直覺、靈性、喜悅、慈悲",reversed:"情感阻塞、空虛、流失、情感遲鈍、被壓抑的情緒",meaning:"聖杯中湧出清水代表愛和情感的全新開始。打開你的心好消息和溫暖即將流入。",rev_meaning:"逆位暗示情感被阻塞或空虛。你可能需要先處理舊的傷痛才能迎接新的人事物。"},
  {num:"2",name:"聖杯二",en:"Two of Cups",type:"minor-suit-cups",upright:"伴侶、和諧、吸引力、合作、連結、戀愛",reversed:"失衡、分手、誤解、關係緊張、不和、拒絕",meaning:"聖杯二代表兩人互換杯子象徵和諧的夥伴關係。無論事業或愛情這都是一張好牌。",rev_meaning:"逆位暗示關係中出現裂痕或合作不順。需要重新溝通和理解。"},
  {num:"3",name:"聖杯三",en:"Three of Cups",type:"minor-suit-cups",upright:"慶祝、友誼、社交、團聚、喜悅、合作",reversed:"過度放縱、社交疲勞、八卦、衝突、孤立、第三者",meaning:"聖杯三代表三位朋友舉杯同歡。友誼、慶祝和社交活動帶來歡樂。",rev_meaning:"逆位暗示社交過度造成疲勞或朋友間出現衝突。也可能是第三者介入。"},

  {num:"10",name:"聖杯十",en:"Ten of Cups",type:"minor-suit-cups",upright:"家庭幸福、圓滿、和諧、永恆的喜悅、情感豐盛",reversed:"家庭不和、失衡、破碎、價值觀不一致、表面和諧",meaning:"聖杯十代表彩虹下的一家人象徵家庭幸福和情感圓滿。這是最美好的家庭牌。",rev_meaning:"逆位暗示家庭或關係中隱藏的不和諧。表面看似美滿但內部有裂痕。"},

  {num:"14",name:"聖杯國王",en:"King of Cups",type:"minor-suit-cups",upright:"冷靜、情感成熟、外交手腕、平衡、智慧、包容",reversed:"情緒操縱、冷漠、陰沉、情緒波動、自私、不負責任",meaning:"聖杯國王在海洋中保持平靜代表情感的掌控和智慧。不管外界如何波動你都能保持沉著。",rev_meaning:"逆位暗示你被情緒控制或正在操控他人。需要回歸冷靜和真誠。"},

let currentScene = 1;
let question = "";
let selectedSpread = null;
let drawnCards = [];
let shuffledDeck = [];
let drawCount = 0;
let maxDraw = 0;

// ==================== 星星背景 ====================
function initStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() * 3 + 1;

    star.style.top = Math.random() * 100 + '%';

// ==================== 場景切換 ====================
function showScene(num) {
  document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
  document.getElementById('scene' + num).classList.add('active');
  document.querySelectorAll('.step').forEach((s, i) => {
    s.classList.remove('active', 'done');
    if (i + 1 < num) s.classList.add('done');
    if (i + 1 === num) s.classList.add('active');
  });
  currentScene = num;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function prevScene() {
  if (currentScene > 1) showScene(currentScene - 1);
}

// ==================== 步驟 1 → 2 ====================
function goToSpreadSelect() {
  const input = document.getElementById('questionInput').value.trim();
  if (!input) {
    alert('請先輸入你的問題');
    return;
  }
  question = input;
  renderSpreadOptions();
  showScene(2);
}

// ==================== 步驟 2：牌陣選擇 ====================
function renderSpreadOptions() {
  const container = document.getElementById('spreadOptions');
  container.innerHTML = '';
  for (const [key, spread] of Object.entries(spreads)) {
    const card = document.createElement('div');
    card.className = 'spread-card';
    card.onclick = () => selectSpread(key, card);
    card.innerHTML = `
      <h3>${spread.name}</h3>
      <p>${spread.desc}</p>
      <div class="positions">${spread.positions.length} 張牌</div>
    `;
    container.appendChild(card);
  }
}

function selectSpread(key, el) {
  document.querySelectorAll('.spread-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedSpread = key;
  document.getElementById('selectSpreadBtn').disabled = false;
}

function goToShuffle() {
  if (!selectedSpread) return;
  showScene(3);
  document.getElementById('questionDisplay').innerHTML = `<div class="question-display">📌 你的問題：${question}</div>`;
  shuffleDeck();
}

// ==================== 步驟 3：洗牌 ====================
function shuffleDeck() {
  const deck = document.getElementById('deckDisplay');
  deck.classList.add('shuffling');
  shuffledDeck = [...tarotCards].sort(() => Math.random() - 0.5).map(card => {
    return { ...card, isReversed: Math.random() < 0.3 };
  });
  setTimeout(() => deck.classList.remove('shuffling'), 1000);
}

function goToDraw() {
  if (shuffledDeck.length === 0) shuffleDeck();
  renderFanCards();
  drawCount = 0;
  maxDraw = spreads[selectedSpread].positions.length;
  drawnCards = [];
  document.getElementById('questionDisplay2').innerHTML = `<div class="question-display">📌 你的問題：${question}</div>`;
  updateDrawCounter();
  showScene(4);
}

function updateDrawCounter() {
  const counter = document.getElementById('drawCounter');
  counter.innerHTML = `已抽 <span class="current">${drawCount}</span> / ${maxDraw} 張`;
}

// ==================== 步驟 4：抽牌 ====================
function renderFanCards() {
  const container = document.getElementById('fanCards');
  container.innerHTML = '';
  shuffledDeck.forEach((card, idx) => {
    const el = document.createElement('div');
    el.className = 'fan-card';
    el.innerHTML = `<div class="card-back"></div>`;
    el.onclick = () => drawCard(idx, el);
    container.appendChild(el);
  });
}

function drawCard(idx, el) {
  if (drawCount >= maxDraw) return;
  el.classList.add('selected');
  setTimeout(() => { el.style.visibility = 'hidden'; }, 300);
  drawnCards.push(shuffledDeck[idx]);
  drawCount++;
  updateDrawCounter();
  if (drawCount >= maxDraw) {
    setTimeout(() => goToReveal(), 600);
  }
}

function goToReveal() {
  renderSpreadDisplay();
  document.getElementById('questionDisplay3').innerHTML = `<div class="question-display">📌 你的問題：${question}</div>`;
  document.getElementById('interpretBtn').style.display = 'none';
  document.getElementById('resultArea').style.display = 'none';
  document.getElementById('finalButtons').style.display = 'none';
  document.getElementById('detailBtnGroup').style.display = 'none';
  document.getElementById('detailArea').style.display = 'none';
  document.getElementById('aiArea').style.display = 'none';
  showScene(5);
}

// ==================== 步驟 5：翻牌 ====================
let revealedCount = 0;

function renderSpreadDisplay() {
  const container = document.getElementById('spreadDisplay');
  container.innerHTML = '';
  container.className = 'spread-display';
  const positions = spreads[selectedSpread].positions;
  drawnCards.forEach((card, idx) => {
    const wrapper = document.createElement('div');
    wrapper.className = 'card-position';
    const label = document.createElement('div');
    label.className = 'position-label';
    label.textContent = positions[idx];
    const flip = document.createElement('div');
    flip.className = 'card-flip';
    flip.dataset.cardIndex = idx;
    flip.onclick = () => revealCard(flip);
    const inner = document.createElement('div');
    inner.className = 'card-flip-inner';
    const back = document.createElement('div');
    back.className = 'back';
    const front = document.createElement('div');
    front.className = 'front';
    front.innerHTML = getCardFront(card);
    if (card.isReversed) {
      flip.classList.add('reversed');
    }
    inner.appendChild(back);
    inner.appendChild(front);
    flip.appendChild(inner);
    wrapper.appendChild(label);
    wrapper.appendChild(flip);
    container.appendChild(wrapper);
  });
  revealedCount = 0;
}

function getCardFront(card) {
  let color = '#c9a84c';
  if (card.type === 'major') color = '#6b3fa0';
  else if (card.type.includes('wands')) color = '#c0392b';
  else if (card.type.includes('cups')) color = '#2980b9';
  else if (card.type.includes('swords')) color = '#7f8c8d';
  else if (card.type.includes('pentacles')) color = '#27ae60';
  return `
    <div class="fallback">
      <div class="num" style="color:${color}">${card.num}</div>
      <div class="name">${card.name}</div>
      ${card.isReversed ? '<div class="sd">逆位</div>' : '<div class="sd" style="color:var(--green)">正位</div>'}
    </div>
  `;
}

function revealCard(el) {
  if (el.classList.contains('flipped')) return;
  el.classList.add('flipped');
  revealedCount++;
  if (revealedCount === drawnCards.length) {
    document.getElementById('interpretBtn').style.display = 'inline-block';
  }
}

function revealAll() {
  document.querySelectorAll('.card-flip').forEach(el => {
    if (!el.classList.contains('flipped')) {
      el.classList.add('flipped');
    }
  });
  revealedCount = drawnCards.length;
  document.getElementById('interpretBtn').style.display = 'inline-block';
}

// ==================== 解牌 ====================
function interpret() {
  const positions = spreads[selectedSpread].positions;
  let html = `<h2>🔍 完整解牌</h2>`;
  html += `<div class="question-display">📌 ${question}</div>`;
  drawnCards.forEach((card, idx) => {
    const reversed = card.isReversed;
    const meaning = reversed ? card.rev_meaning : card.meaning;
    const keywords = reversed ? card.reversed : card.upright;
    html += `
      <div class="result-card">
        <h3>${idx + 1}. ${positions[idx]} — ${card.name}（${card.num}）</h3>
        <p>${reversed ? '<span class="reversed">▼ 逆位</span>' : '<span class="upright">▲ 正位</span>'}</p>
        <p><strong>關鍵字：</strong>${keywords}</p>
        <p class="meaning">${meaning}</p>
      </div>
    `;
  });
  
  // 綜合解析
  html += `<div class="summary"><h3>🌿 綜合解析</h3><p>`;
  const majorCount = drawnCards.filter(c => c.type === 'major').length;
  const reversedCount = drawnCards.filter(c => c.isReversed).length;
  if (majorCount >= drawnCards.length / 2) {
    html += `這次抽出的牌中，大阿爾克那（大牌）佔了 ${majorCount} 張，表示你正面臨人生中一個重要的轉折點，這個問題對你意義重大。`;
  } else {
    html += `這次抽出的牌以小阿爾克那為主，表示這個問題主要圍繞日常生活中的事件與情緒波動。`;
  }
  if (reversedCount > drawnCards.length / 2) {
    html += `逆位牌偏多（${reversedCount}/${drawnCards.length}），暗示目前可能處於阻滯或需要調整的階段，事情未必如計畫順利推進，需要多些耐心和應變。`;
  } else if (reversedCount === 0) {
    html += `全部正位，能量流動順暢，整體來說偏正向發展。`;
  } else {
    html += `正逆位參半，代表這個問題有好的可能性，但也要注意部分的阻力與挑戰。`;
  }
  html += `</p></div>`;
  
  document.getElementById('resultArea').innerHTML = html;
  document.getElementById('resultArea').style.display = 'block';
  document.getElementById('detailBtnGroup').style.display = 'flex';
  document.getElementById('finalButtons').style.display = 'flex';
  document.getElementById('interpretBtn').style.display = 'none';
  document.getElementById('detailArea').style.display = 'none';

  setTimeout(() => {
    document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth' });
  }, 300);
}

// ==================== 詳細解牌（針對問題） ====================
function interpretDetailed() {
  const positions = spreads[selectedSpread].positions;
  const q = question;

  // 偵測問題類型
  const qType = detectQuestionType(q);

  // 計算正負向分數
  let positiveScore = 0, neutralScore = 0, negativeScore = 0;
  drawnCards.forEach(card => {
    const score = scoreCard(card, qType);
    if (score > 0) positiveScore += score;
    else if (score < 0) negativeScore += -score;
    else neutralScore += 1;
  });
  const total = drawnCards.length;
  const positivePct = Math.round((positiveScore / (positiveScore + negativeScore + neutralScore)) * 100);
  const negativePct = Math.round((negativeScore / (positiveScore + negativeScore + neutralScore)) * 100);
  const neutralPct = 100 - positivePct - negativePct;

  let verdict, verdictClass;
  if (positivePct >= 65) { verdict = "偏向正面 ✅"; verdictClass = "yes"; }
  else if (negativePct >= 55) { verdict = "偏向負面 ❌"; verdictClass = "no"; }
  else { verdict = "中性 / 有變數 🔮"; verdictClass = "maybe"; }

  let html = `<h2>🔮 針對問題的詳細解牌</h2>`;
  html += `<div class="question-display">📌 ${q}</div>`;

  // 問題類型
  html += `<div class="detail-section"><h3>📋 問題分析</h3><p>`;
  html += getQuestionTypeText(qType);
  html += `</p></div>`;

  // 逐牌針對性解說
  html += `<div class="detail-section"><h3>🃏 逐牌針對性解說</h3>`;
  drawnCards.forEach((card, idx) => {
    const reversed = card.isReversed;
    const tag = reversed ? '<span class="pos-tag rev">逆位</span>' : '<span class="pos-tag up">正位</span>';
    html += `<p><strong>${positions[idx]}：</strong>${tag}<strong>${card.name}</strong><br>`;
    html += getCardContextReading(card, positions[idx], qType, reversed);
    html += `</p>`;
  });
  html += `</div>`;

  // 牌陣整體故事線
  html += `<div class="detail-section"><h3>📖 牌陣故事線</h3><p>`;
  html += getSpreadNarrative(drawnCards, positions, qType, selectedSpread);
  html += `</p></div>`;

  // 分數圖表
  html += `<div class="scoring-chart"><h3 style="color:var(--gold-light);margin-bottom:12px">📊 能量分佈</h3>`;
  html += `<div class="bar-label"><span style="color:#2ecc71">正面能量 ${positivePct}%</span><span style="color:#f1c40f">中性 ${neutralPct}%</span><span style="color:#e74c3c">負面能量 ${negativePct}%</span></div>`;
  html += `<div class="bar-container"><div class="bar-fill positive" style="width:${positivePct}%;float:left"></div><div class="bar-fill neutral" style="width:${neutralPct}%;float:left"></div><div class="bar-fill negative" style="width:${negativePct}%;float:left"></div></div></div>`;

  // 結論
  html += `<div class="detail-answer"><h3>🔮 占卜結論</h3>`;
  html += `<div class="verdict ${verdictClass}">${verdict}</div>`;
  html += `<div class="detail-advice"><strong>具體建議：</strong><br>${getAdvice(drawnCards, qType, verdictClass)}</div></div>`;

  document.getElementById('detailArea').innerHTML = html;
  document.getElementById('detailArea').style.display = 'block';
  document.getElementById('detailBtnGroup').style.display = 'none';

  setTimeout(() => {
    document.getElementById('detailArea').scrollIntoView({ behavior: 'smooth' });
  }, 300);

  // 觸發動畫
  setTimeout(() => {
    document.querySelectorAll('.bar-fill').forEach(bar => {
      const w = bar.style.width;
      bar.style.width = '0';
      setTimeout(() => bar.style.width = w, 50);
    });
  }, 100);
}

// 偵測問題類型
function detectQuestionType(q) {
  const s = q.toLowerCase();
  if (/賣|房子|房屋|出售|出售|房地|買賣|轉手|脫手/.test(q)) return "property";
  if (/事业|工作|職場|求職|升遷|創業|事業|轉職|離職|老闆|加薪|生意/.test(q)) return "career";
  if (/感情|愛情|戀愛|交往|結婚|婚姻|復合|對象|另一半|曖昧|前任|分手|桃花/.test(q)) return "love";
  if (/財|錢|賺|收入|投資|理財|賠|獲利|盈餘|富/.test(q)) return "money";
  if (/健康|生病|病情|身體|疾病|痊癒|復原|病/.test(q)) return "health";
  if (/學業|考試|考|讀書|升學|成績|學習|金榜|錄取/.test(q)) return "study";
  if (/旅行|出差|搬|移居|出國|長途|旅行|航班/.test(q)) return "travel";
  return "general";
}

// 為每張牌評分（-2 ~ +2）
function scoreCard(card, qType) {
  const major = card.type === "major";
  let base = 0;
  // 先以牌的普遍吉凶性質為基礎分
  const veryPos = ["太陽","世界","命運之輪","星星","皇后","節制","聖杯九","聖杯十","錢幣十","權杖六","權杖四"];
  const pos = ["愚者","魔術師","女祭司","戀人","戰車","力量","隱者","正義","審判","權杖王牌","聖杯王牌","寶劍王牌","錢幣王牌","權杖三","權杖八","錢幣三","錢幣九","聖杯二","聖杯六","寶劍六","錢幣六","錢幣七"];
  const neg = ["倒吊人","月亮","寶","寶劍三","寶劍五","寶","寶劍七","寶劍九","寶劍十","錢幣五","聖杯五","聖杯四","聖杯七","聖杯八","權杖五","權杖七","權杖九","權杖十","錢幣四"];
  const veryNeg = ["高塔","死神","惡魔"];
  const mixed = ["皇帝","教皇","寶劍二","寶劍四","錢幣二","權杖二"];

  const name = card.name;
  if (veryPos.includes(name)) base = 2;
  else if (pos.includes(name)) base = 1;
  else if (neg.includes(name)) base = -1;
  else if (veryNeg.includes(name)) base = -1.5;
  else if (mixed.includes(name)) base = 0;
  else base = major ? 0.5 : 0;

  // 逆位通常扣分（但惡魔、死神、高塔逆位反而是好）
  if (card.isReversed) {
    if (["惡魔","死神","高塔","寶劍十","寶","寶劍九","寶劍三"].includes(name)) base += 1;
    else base = base - 1;
  }

  // 針對問題類型微調
  if (qType === "property") {
    if (["錢幣王牌","錢幣六","錢","錢幣十","權杖六","權杖八","太陽","世界"].includes(name)) base += 0.5;
    if (["死神","高塔","惡魔","寶劍十"].includes(name) && !card.isReversed) base -= 0.5;
    if (["錢幣四","權杖七"].includes(name)) base -= 0.5;
  }
  if (qType === "career") {
    if (["皇帝","魔術師","戰車","權杖六","權杖國王","錢幣國王"].includes(name)) base += 0.5;
  }
  if (qType === "love") {
    if (["戀人","聖杯二","聖杯十","聖杯六","皇后"].includes(name)) base += 0.5;
  }
  if (qType === "money") {
    if (["錢幣王牌","錢","錢幣九","錢幣十","皇后","世界"].includes(name)) base += 0.5;
    if (["錢幣五","錢幣四逆位","寶劍十"].includes(name)) base -= 0.5;
  }

  return base;
}

// 逐牌針對性解說
function getCardContextReading(card, position, qType, reversed) {
  const map = {
    property:GetPropertyReading(card, position, reversed),
    career:GetCareerReading(card, position, reversed),
    love:GetLoveReading(card, position, reversed),
    money:GetMoneyReading(card, position, reversed),
    health:GetHealthReading(card, position, reversed),
    study:GetStudyReading(card, position, reversed),

function getSpreadNarrative(cards, positions, qType, spreadKey) {
  if (spreadKey === "single") {
    return `這張牌指出你目前的指引方向：${cards[0].name}（${cards[0].isReversed ? '逆位' : '正位'}）。${cards[0].isReversed ? cards[0].rev_meaning : cards[0].meaning}`;
  }
  if (spreadKey === "three") {
    const past = cards[0], now = cards[1], future = cards[2];
    return `從<strong>${positions[0]}</strong>的「${past.name}」可以看到，這件事的起因是${past.isReversed ? past.rev_meaning : past.meaning}<br><br>
    來到<strong>${positions[1]}</strong>的「${now.name}」，目前的狀況是${now.isReversed ? now.rev_meaning : now.meaning}<br><br>
    而<strong>${positions[2]}</strong>的「${future.name}」指出下一步的走向：${future.isReversed ? future.rev_meaning : future.meaning}<br><br>
    <em>整體來看，${past.name} → ${now.name} → ${future.name} 的能量流動${isNarrativePositive(cards) ? '偏向正面發展' : '存在需要克服的阻力'}。</em>`;
  }
  if (spreadKey === "five") {
    let s = "這組牌呈現完整的現況分析：<br><br>";
    cards.forEach((c, i) => {
      s += `<strong>${positions[i]}</strong>：${c.name}（${c.isReversed ? '逆位' : '正位'}）— ${c.isReversed ? c.rev_meaning : c.meaning}<br><br>`;
    });
    s += `<em>${isNarrativePositive(cards) ? '整體能量流動順暢，建議把握時機。' : '整體來說需要適度調整，阻力可以轉化為成長。'}</em>`;
    return s;
  }
  if (spreadKey === "celtic") {
    let s = "這組克爾特十字牌陣提供最完整的占卜視角：<br><br>";
    cards.forEach((c, i) => {
      s += `• <strong>${positions[i]}</strong>：${c.name}（${c.isReversed ? '逆位' : '正位'}）— ${c.isReversed ? c.rev_meaning : c.meaning}<br><br>`;
    });
    const lastCard = cards[cards.length - 1];
    s += `<em>最終結果指向${lastCard.name}，${lastCard.isReversed ? '需要注意尚未完成的課題' : '整體走向偏向圓滿'}。</em>`;
    return s;
  }
  return "";
}

function isNarrativePositive(cards) {
  let pos = 0;
  cards.forEach(c => { if (scoreCard(c, "general") > 0) pos++; });
  return pos >= cards.length / 2;
}

async function interpretWithAI() {
  const apiKey = localStorage.getItem('anthropic_api_key');
  if (!apiKey) {
    const area = document.getElementById('aiArea');
    area.style.display = 'block';
    area.innerHTML = `<div class="ai-error">⚠ 尚未設定 API Key。<br>請點右上角 ⚙ 按鈕輸入你的 Claude API Key。</div>`;
    area.scrollIntoView({ behavior: 'smooth' });
    return;
  }

  const model = localStorage.getItem('anthropic_model') || 'claude-sonnet-4-20250514';
  const area = document.getElementById('aiArea');
  area.style.display = 'block';
  area.innerHTML = `<div class="ai-loading"><div class="spinner"></div><p> Claude 正在深入分析你的牌面...<br>這可能需要幾秒鐘✨</p></div>`;
  area.scrollIntoView({ behavior: 'smooth' });

  const positions = spreads[selectedSpread].positions;
  const cardList = drawnCards.map((card, idx) => {
    return `位置 ${idx + 1}「${positions[idx]}」：${card.name}（編號 ${card.num}）${card.isReversed ? '【逆位】' : '【正位】'}\n  關鍵字：${card.isReversed ? card.reversed : card.upright}`;
  }).join('\n\n');

  const prompt = buildAIPrompt(question, positions, drawnCards, cardList);

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: model,
        max_tokens: 3000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!response.ok) {
      const errText = await response.text();
      throw new Error(`API 錯誤 (${response.status}): ${errText}`);
    }

    const data = await response.json();
    const aiText = data.content && data.content[0] ? data.content[0].text : '未收到回應';

    area.innerHTML = `<div class="ai-content">${markdownToHtml(aiText)}</div>
      <div class="btn-group"><button class="btn btn-ai" onclick="interpretWithAI()">🔄 重新解牌</button></div>`;
    area.scrollIntoView({ behavior: 'smooth' });
  } catch (err) {

// ==================== 複製牌面給 AI（方案1）====================
function copyForAI() {
  const positions = spreads[selectedSpread].positions;
  const spreadName = spreads[selectedSpread].name;

  let text = `我是用塔羅占卜網頁抽出的牌，請你以專業塔羅占卜師的身分，依據 Rider-Waite 塔羅系統為我解讀。

【我的問題】
${question}

【使用牌陣】${spreadName}牌陣（共 ${drawnCards.length} 張）

【抽出的牌】
`;

  drawnCards.forEach((card, idx) => {
    text += `位置 ${idx + 1}「${positions[idx]}」：${card.name}（編號 ${card.num}）${card.isReversed ? '【逆位】' : '【正位】'}\n`;
    text += `  關鍵字：${card.isReversed ? card.reversed : card.upright}\n\n`;
  });

  text += `
請依照以下結構回答：
1. 問題與牌陣分析
2. 逐牌解讀（請扣回我的問題，正位/逆位都要準確說明）
3. 整體占卜結論（明確指出正面/中性/負面）
4. 具體可行的建議（3 點以內）`;

  // 複製到剪貼簿
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {
      showToast('✅ 已複製到剪貼簿！請貼到 AI 對話框（claude.ai 或此處）');
    }).catch(() => {
      fallbackCopy(text);
    });
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
    showToast('✅ 已複製到剪貼簿！請貼到 AI 對話框');
  } catch (e) {
    showToast('❌ 複製失敗，請手動複製');
  }
  document.body.removeChild(ta);
}

function showToast(msg) {
  let toast = document.getElementById('toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'toast';
    toast.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--gold);color:#000;padding:12px 25px;border-radius:25px;font-size:.95em;z-index:300;box-shadow:0 4px 15px rgba(0,0,0,.4);transition:opacity .3s';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.style.opacity = '1';
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => { toast.style.opacity = '0'; }, 3000);
}

// 簡易 Markdown 轉 HTML
function markdownToHtml(md) {
  let html = md;
  // 跳脫 HTML 特殊字元
  html = html.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  // 標題
  html = html.replace(/^## (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^# (.+)$/gm, '<h3>$1</h3>');
  // 粗體
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // 斜體
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // 列表
  html = html.replace(/^• (.+)$/gm, '<p>• $1</p>');
  html = html.replace(/^- (.+)$/gm, '<p>• $1</p>');
  // 數字列表
  html = html.replace(/^\d+\. (.+)$/gm, '<p>$1</p>');
  // 換行 → 段落
  const lines = html.split('\n');
  let result = '';
  let inUl = false;
  for (let line of lines) {
    if (line.match(/^<h3>|<p>/)) {
      if (inUl) { result += '</ul>'; inUl = false; }
      result += line + '\n';
    } else if (line.match(/^<p>•/)) {
      result += line.replace('<p>', '').replace('</p>', '') + '\n';
    } else if (line.trim() === '') {
      if (inUl) { result += '</ul>'; inUl = false; }
    } else {
      result += `<p>${line}</p>\n`;
    }
  }
  // 連續列表項包 ul
  result = result.replace(/(<li>[^<]*<\/li>(\s*<li>[^<]*<\/li>)+)/g, '<ul>$1</ul>');
  result = result.replace(/^• (.+)$/gm, '<li>• $1</li>');
  // 再次處理：把連續 li 包成 ul
  result = result.replace(/(<li>[^<]*<\/li>\n?)+/g, m => '<ul>' + m + '</ul>');
  return result;
}
